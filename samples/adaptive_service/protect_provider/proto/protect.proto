syntax = "proto3";

package adaptive.protect;

option go_package = "dubbo.apache.org/dubbo-go/v3/samples/adaptive_service/protect_provider/proto;protectpb";

message WorkRequest {
  string name = 1;
  int32 payload_bytes = 2;
}

message WorkResponse {
  string message = 1;
  int64 sequence = 2;
}

service ProtectService {
  rpc Work(WorkRequest) returns (WorkResponse) {}
}
